<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Sea - Produto</title>
    <link rel="icon" href="https://www.southsea.com.br/newimag/Ellipse%209.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div id="loading" class="text-center text-gray-500">
        <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        <p>Carregando informações do produto...</p>
    </div>

    <div id="error-container" class="hidden text-center text-red-500 max-w-md w-full bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <h2 class="text-2xl font-bold mb-2">Erro</h2>
        <p id="error-message">Produto não encontrado.</p>
    </div>

    <div id="product-card" class="hidden max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden transition-all duration-300 transform">
        <!-- Banner Hero -->
        <div class="h-32 bg-gradient-to-r from-blue-600 to-teal-500"></div>
        
        <div class="p-8 text-center -mt-16">
            <!-- Pfp / Logo -->
            <div class="inline-flex items-center justify-center bg-white p-2 rounded-full shadow-lg mb-6 w-24 h-24">
                <img src="https://www.southsea.com.br/newimag/Ellipse%209.svg" alt="South Sea" class="h-16 w-16 object-contain">
            </div>
            
            <!-- Details -->
            <h1 id="product-title" class="text-3xl font-extrabold text-gray-900 mb-3 tracking-tight">Nome do Produto</h1>
            <p id="product-desc" class="text-gray-500 mb-8 leading-relaxed">Descrição do produto vai aqui.</p>
            
            <div class="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100">
                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-2">Valor Unitário</p>
                <div id="product-price" class="text-4xl font-black text-green-500">R$ 0,00</div>
            </div>
            
            <!-- Checkout button -->
            <a id="checkout-btn" href="#" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-[0_8px_30px_rgb(37,99,235,0.2)] hover:shadow-[0_8px_30px_rgb(37,99,235,0.4)] transition-all duration-300 hover:-translate-y-1">
                Comprar Agora
            </a>
            
            <!-- Trust badge -->
            <div class="mt-6 flex items-center justify-center space-x-2 text-xs text-gray-400 font-medium">
                <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                <span>Pagamento Seguro Mercado Pago</span>
            </div>
        </div>
    </div>

    <script type="module" src="public-product.js"></script>
</body>
</html>
