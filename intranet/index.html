<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise - South Sea Kanban</title>
    <!-- Favicon -->
    <link rel="icon" href="https://www.southsea.com.br/newimag/Ellipse%209.svg">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind CSS for dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- Google Fonts: Montserrat & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Custom Styles */
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        
        <!-- Backdrop for mobile sidebar -->
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 flex flex-col h-screen transition-all duration-300 ease-in-out">
            <div id="header-container"></div>

            <!-- Board Content -->
            <div class="p-4 md:p-6 lg:p-8 flex flex-col overflow-y-auto custom-scrollbar">
                <div id="date-filter-section" class="flex items-center gap-4 mb-6">
                    <div class="flex-grow"></div>
                    <!-- Button will be injected here or in dashboard template -->
                </div>

                <div id="dashboard-content" class="flex-grow flex flex-col">
                    <!-- O conteúdo do dashboard será renderizado aqui pelo analysis.js -->
                    <div class="flex items-center justify-center h-full">
                    <p class="text-xl text-gray-400">Carregando dados de análise...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Date Filter Modal -->
    <div id="dateFilterModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="date-modal-content w-full max-w-md rounded-3xl p-8 transform transition-all">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xl font-black font-montserrat uppercase tracking-tight italic">Filtrar Período</h3>
                <button id="closeDateModal" class="text-gray-400 hover:text-black dark:hover:text-white transition-colors">
                    <i class="fas fa-times fa-lg"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block font-montserrat">Selecione o Mês</label>
                    <select id="month-select" class="date-select-item"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block font-montserrat">Selecione o Ano</label>
                    <select id="year-select" class="date-select-item"></select>
                </div>
                
                <button id="apply-date-filter" class="btn-branded-black w-full mt-4 justify-center flex items-center gap-2">
                    <i class="fas fa-check"></i> Aplicar Filtro
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadComponents, setupUIListeners } from './common-ui.js';
        import './index.js'; // Import to execute the analysis script

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents(() => {
                // This function is called after components are loaded
                document.getElementById('addProspectBtnHeader')?.remove();
                setupUIListeners(); // Setup common listeners like the sidebar toggle
            });
        });
    </script>
</body>
</html>
