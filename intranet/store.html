<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Sea - Store</title>
    <link rel="icon" href="https://www.southsea.com.br/newimag/Ellipse%209.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="log.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
    <div class="flex h-screen">
        <div id="sidebar-container"></div>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden"></div>
        <main id="main-content" class="flex-1 flex flex-col h-screen transition-all duration-300 ease-in-out">
            <div id="header-container"></div>
            <div class="flex-grow p-4 md:p-6 lg:p-8 flex flex-col overflow-y-auto">
                <h1 class="text-2xl font-bold mb-4 text-gray-800 dark:text-white">Store & Pagamentos</h1>

                <!-- Tabs -->
                <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
                    <button id="tab-produtos" class="px-4 py-2 text-sm font-medium text-blue-600 border-b-2 border-blue-600 dark:text-blue-400 dark:border-blue-400 focus:outline-none">Produtos</button>
                    <button id="tab-pagamentos" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 focus:outline-none">Histórico de Pagamentos</button>
                </div>

                <!-- Products Section -->
                <div id="section-produtos" class="block">
                    <!-- Add Product Form -->
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg mb-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-white">Criar Novo Produto</h2>
                    <form id="product-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="product-name" class="block text-sm font-medium text-gray-600 dark:text-gray-300">Nome do Produto</label>
                                <input type="text" id="product-name" required class="w-full px-3 py-2 mt-1 text-gray-800 dark:text-white bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md">
                            </div>
                            <div>
                                <label for="product-price" class="block text-sm font-medium text-gray-600 dark:text-gray-300">Preço (R$)</label>
                                <input type="number" step="0.01" id="product-price" required class="w-full px-3 py-2 mt-1 text-gray-800 dark:text-white bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md">
                            </div>
                            <div class="md:col-span-2">
                                <label for="product-desc" class="block text-sm font-medium text-gray-600 dark:text-gray-300">Descrição</label>
                                <textarea id="product-desc" rows="3" class="w-full px-3 py-2 mt-1 text-gray-800 dark:text-white bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md"></textarea>
                            </div>
                        </div>
                        <div class="mt-6 flex items-center mb-2">
                            <button type="submit" id="submit-product-btn" class="px-4 py-2 font-bold text-white bg-blue-600 rounded-md hover:bg-blue-700">Criar Produto & Link de Pagamento</button>
                        </div>
                    </form>
                </div>

                <!-- Products Table -->
                <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-white">Produtos Criados</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white dark:bg-gray-800">
                            <thead>
                                <tr class="bg-gray-50 dark:bg-gray-700">
                                    <th class="py-2 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-sm font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">Nome</th>
                                    <th class="py-2 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-sm font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">Preço</th>
                                    <th class="py-2 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-sm font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">Link Público</th>
                                    <th class="py-2 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-sm font-semibold text-gray-600 dark:text-gray-300 uppercase tracking-wider">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="products-table-body" class="divide-y divide-gray-200 dark:divide-gray-700">
                                <!-- Product rows will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>
                </div>

                <!-- Payments Section -->
                <div id="section-pagamentos" class="hidden">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg mb-6">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                            <h2 class="text-xl font-semibold text-gray-800 dark:text-white">Histórico de Pagamentos</h2>
                            <div class="flex w-full md:w-auto gap-2">
                                <input type="text" id="payments-search" placeholder="Buscar por email, ID..." class="w-full md:w-64 px-3 py-2 text-sm text-gray-800 dark:text-white bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <select id="payments-status-filter" class="px-3 py-2 text-sm text-gray-800 dark:text-white bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="">Status: Todos</option>
                                    <option value="approved">Aprovado</option>
                                    <option value="pending">Pendente</option>
                                    <option value="rejected">Rejeitado</option>
                                </select>
                                <button id="payments-refresh-btn" class="px-3 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-white rounded hover:bg-gray-300 dark:hover:bg-gray-500 transition"><i class="fas fa-sync-alt"></i></button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white dark:bg-gray-800">
                                <thead>
                                    <tr class="bg-gray-50 dark:bg-gray-700">
                                        <th class="py-3 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">ID</th>
                                        <th class="py-3 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Data</th>
                                        <th class="py-3 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Produto</th>
                                        <th class="py-3 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Cliente / Email</th>
                                        <th class="py-3 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Valor</th>
                                        <th class="py-3 px-4 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="payments-table-body" class="divide-y divide-gray-200 dark:divide-gray-700">
                                    <tr><td colspan="6" class="text-center py-8 text-gray-500">Carregando histórico de pagamentos...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <div id="modal-container"></div>
    <script type="module" src="auth.js"></script>
    <script type="module" src="store.js"></script>
</body>
</html>
