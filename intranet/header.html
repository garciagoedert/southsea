<header class="glass-morphism sticky top-0 z-50 flex items-center justify-between p-4 border-b border-white/5 flex-shrink-0 shadow-xl" style="background: rgba(13, 17, 23, 0.9) !important;">
    <div class="flex items-center gap-4">
        <button id="menu-toggle" class="p-2 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition-all duration-200" aria-label="Toggle menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <a href="index.html" class="flex items-center">
            <img src="https://www.southsea.com.br/newimag/Vector.svg" alt="South Sea Logo" class="h-8 brightness-0 invert">
        </a>
    </div>
    <div id="header-actions-container" class="flex items-center gap-3">
        <div id="kanban-subrole-buttons" class="hidden items-center gap-2">
            <button id="btn-kanban-dev" data-subrole="dev" class="subrole-btn btn-branded-white !py-2 !px-4 !text-[10px]">Dev</button>
            <button id="btn-kanban-designer" data-subrole="designer" class="subrole-btn btn-branded-white !py-2 !px-4 !text-[10px]">Designer</button>
            <button id="btn-kanban-gestor" data-subrole="gestor" class="subrole-btn btn-branded-white !py-2 !px-4 !text-[10px]">Gestor</button>
        </div>
        <button id="editKanbanBtn" class="hidden btn-branded-white !py-2 !px-4 transition-all duration-200 flex items-center gap-2 justify-center !text-[10px]">
            <i class="fas fa-edit"></i>
            <span class="hidden md:inline">Editar Kanban</span>
        </button>
        <button id="addProspectBtnHeader" class="btn-branded-white !py-2 !px-4 transition-all duration-200 flex items-center gap-2 justify-center !text-[10px]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            <span class="hidden md:inline">Novo Prospect</span>
        </button>
    </div>
</header>
